version: 2

sources:

  - name: postgres # name of the source 
    schema: postgres # this is the schema our raw data lives in
    database: DB26_BRONZE_DB # this is the name of our database quoting:

    quoting: 
      database: false
      schema: false
      identifier: false 
    
    config:
      freshness:
        warn_after: {count: 24, period: hour}
        error_after: {count: 48, period: hour} 
      
    tables:

      - name: user 
        config:
          loaded_at_field: _fivetran_synced 
        columns:
          - name: USER_ID
          - name: UPDATED_AT
          - name: ADDRESS_ID
          - name: LAST_NAME
          - name: CREATED_AT
          - name: PHONE_NUMBER
          - name: TOTAL_ORDERS
          - name: FIRST_NAME
          - name: EMAIL
          - name: _FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED

      - name: promos 
        config:
          loaded_at_field: _fivetran_synced 
        columns:
          - name: PROMO_ID
          - name: DISCOUNT
          - name: STATUS
          - name: _FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED
