version: 2

models:

  - name: user 
    config: 
      contract:
        enforced: true
    description: > 
      Data about all users in demo. 
    columns:
      - name: user_id
        data_tests:
          - not_null
          - unique
        data_type: text 
        constraints:
          - type: not_null      
        description: > 
          UUID for each unique user on platform
      - name: updated_at 
        data_type: TIMESTAMP_NTZ
        constraints:
          - type: not_null
        description: > 
          Update of budget.
      - name: address_id 
        data_type: TIMESTAMP_NTZ 
        constraints:
          - type: not_null
        description: > 
          UUID for each address on platform
      - name: last_name 
        data_type: text
        constraints:
          - type: not_null
        description: > 
          Last name of user
      - name: created_at 
        data_type: TIMESTAMP_NTZ
        constraints:
          - type: not_null
        description: > 
          Creation of user.
      - name: phone_number 
        data_type: number 
        constraints:
          - type: not_null
        description: > 
          Phone number of user
      - name: total_orders 
        data_type: number 
        description: > 
          Total amount of each user
      - name: first_name 
        data_type: text
        constraints:
          - type: not_null
        description: > 
          First name of user
      - name: email 
        data_type: text
        constraints:
          - type: not_null
        description: > 
          Email of user
      - name: _fivetram_deleted
        data_type: TIMESTAMP_TZ 
        description: > 
          Date that the data was deleted
      - name: date_load 
        data_type: TIMESTAMP_TZ 
        constraints:
          - type: not_null
        description: > 
          Date that the data was loaded

  - name: promos 
    config: 
      contract:
        enforced: true
    description: > 
      Data about all users in demo. 
    columns:
      - name: promo_id
        data_tests:
          - not_null
        data_type: text 
        constraints:
          - type: not_null
          - type: unique   
        description: > 
          UUID for each unique promo on platform.
      - name: discount 
        data_type: number
        constraints:
          - type: not_null
        description: > 
          Discount of the promo.
      - name: status 
        data_type: number 
        constraints:
          - type: not_null
        description: > 
          Status of the promo.
      - name: _fivetram_deleted
        data_type: TIMESTAMP_TZ 
        description: > 
          Date that the data was deleted
      - name: date_load 
        data_type: TIMESTAMP_TZ 
        constraints:
          - type: not_null
        description: > 
          Date that the data was loaded

  - name: orders
    description: >
      Data about all orders in demo.
    columns:
      - name: order_id
        data_type: text
        constraints:
          - type: not_null
          - type: unique
        description: >
          UUID for each order.

      - name: user_id
        data_type: text
        constraints:
          - type: not_null
        description: >
          UUID of the user who made the order.

      - name: address_id
        data_type: text
        constraints:
          - type: not_null
        description: >
          UUID of the delivery address.

      - name: promo_id
        data_type: text
        description: >
          Promo applied to the order (if any).

      - name: shipping_service
        data_type: text
        description: >
          Shipping provider used.

      - name: shipping_cost
        data_type: number
        description: >
          Cost of shipping.

      - name: order_cost
        data_type: number
        description: >
          Cost before shipping and discounts.

      - name: order_total
        data_type: number
        description: >
          Final total paid for the order.

      - name: status
        data_type: text
        constraints:
          - type: not_null
        description: >
          Current status of the order.

      - name: tracking_id
        data_type: text
        description: >
          Tracking identifier for shipment.

      - name: created_at
        data_type: TIMESTAMP_NTZ
        constraints:
          - type: not_null
        description: >
          Order creation timestamp.

      - name: estimated_delivery_at
        data_type: TIMESTAMP_NTZ
        description: >
          Estimated delivery timestamp.

      - name: delivered_at
        data_type: TIMESTAMP_NTZ
        description: >
          Actual delivery timestamp.

  - name: adresses
    config:
      contract:
        enforced: true
    description: >
      Data about all addresses in demo.
    columns:
      - name: address_id
        data_type: text
        constraints:
          - type: not_null
          - type: unique
        description: >
          UUID for each address on platform.

      - name: zipcode
        data_type: text
        description: >
          Zip or postal code.

      - name: country
        data_type: text
        description: >
          Country of the address.

      - name: address
        data_type: text
        description: >
          Full address.

      - name: state
        data_type: text
        description: >
          State or region of the address.