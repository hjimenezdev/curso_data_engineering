version: 2

sources:

  - name: google_sheets # name of the source 
    schema: google_sheets # this is the schema our raw data lives in
    database: DB26_BRONZE_DB # this is the name of our database quoting:

    quoting: 
      database: false
      schema: false
      identifier: false 
    
    config:
      freshness:
        warn_after: {count: 24, period: hour}
        error_after: {count: 48, period: hour} 
      
    tables:

      - name: users
        columns:
          - name: Nombre
          - name: DNI
          - name: email
          - name: fecha_alta_sistema
